name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'

jobs:
  build:
    name: Build x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # windows-latest (Windows Server 2025 + Visual Studio 2026) already ships
      # MSVC v145. See https://github.com/actions/runner-images/issues/14017
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution (Release|x64)
        shell: cmd
        run: |
          msbuild chameleonEsp.slnx ^
            /t:Rebuild ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /m /nologo /v:minimal

      - name: Stage artifacts
        shell: pwsh
        run: |
          $outDir = "chameleonEsp\x64\Release"
          if (-not (Test-Path $outDir)) {
            Write-Error "Build output directory not found: $outDir"
            Get-ChildItem -Recurse -Filter "*.dll" | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          $stage = "artifacts\x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # Use Where-Object instead of -Include: PowerShell's -Include with a
          # literal directory path + -Recurse is unreliable and can miss root-
          # level matches (here it skipped chameleonEsp.dll / chameleonEsp.pdb).
          Get-ChildItem -Path $outDir -File -Recurse |
            Where-Object { $_.Extension -in '.dll', '.pdb' } |
            Copy-Item -Destination $stage -Force

          Write-Host "Staged files:"
          Get-ChildItem $stage

          if (-not (Get-ChildItem $stage -Filter *.dll)) {
            Write-Error "No DLL was staged. Build output may have moved."
            exit 1
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chameleonEsp-x64
          path: artifacts/x64/**
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: chameleonEsp-x64
          path: artifacts/x64

      - name: Package zip
        shell: bash
        run: |
          mkdir -p release
          (cd artifacts/x64 && zip -r "../../release/chameleonEsp-x64-${{ steps.tag.outputs.name }}.zip" .)
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: release/*.zip
